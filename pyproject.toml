[project]
name = "XnneHangLabTTS"
version = "0.1.0"
description = "Lightweight TTS showcase repository for GSV-Lite, Genie-TTS, and faster-qwen-tts"
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
  "gradio>=5.24.0",
  "pydantic>=2.10.6",
  "loguru>=0.7.3",
  "soundfile>=0.13.1",
  "python-dotenv>=1.1.1",
  "tomli_w>=1.2.0",
]
authors = [{ name = "MrXnneHang", email = "XnneHang@gmail.com" }]
license = { text = "MIT" }

[project.urls]
Homepage = "https://github.com/XnneHangLab/XnneHangLabTTS"
Repository = "https://github.com/XnneHangLab/XnneHangLabTTS"
Issues = "https://github.com/XnneHangLab/XnneHangLabTTS/issues"

[dependency-groups]
base = [
  "numpy==1.26.4",
]

dev = [
  "pytest>=8.3.4",
  "ruff>=0.9.3",
  "pyright>=1.1.391",
]

cpu = [
  "torch==2.6",
  "torchaudio==2.6",
]

gpu = [
  "torch==2.6",
  "torchaudio==2.6",
]

genie-tts = [
  "onnx",
  "onnxruntime==1.22.1",
  "pyyaml",
  "huggingface_hub[hf_xet]",
  "pyopenjtalk-plus",
  "nltk",
  "g2pM",
  "jamo",
  "ko_pron",
  "g2pk2",
  "eunjeon; sys_platform == 'win32'",
  "fast_langdetect",
]

gsv-lite = [
  "gsv-tts-lite==0.3.8",
]

qwen-tts = [
  "faster-qwen3-tts>=0.2.5",
  "soxr>=1.0.0",
  "sounddevice>=0.5.2",
]

[tool.uv]
default-groups = ["base", "dev"]

[[tool.uv.index]]
name = "pytorch-cu118"
url = "https://download.pytorch.org/whl/cu118"
explicit = true

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cu118", marker = "sys_platform == 'win32'" },
  { index = "pytorch-cpu", marker = "sys_platform != 'win32'" },
]
torchaudio = [
  { index = "pytorch-cu118", marker = "sys_platform == 'win32'" },
  { index = "pytorch-cpu", marker = "sys_platform != 'win32'" },
]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
